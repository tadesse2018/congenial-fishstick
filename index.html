<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIA Grade Pro - Smart Flow</title>
<style>
:root{--p:#1e40af;--s:#15803d;--d:#b91c1c;--bg:#f1f5f9;--w:#f59e0b;--card-blue:#1e3a8a;--tg:#0088cc}
*{box-sizing:border-box;font-family:Nyala, 'Segoe UI', sans-serif}
body{margin:0;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.app-header { background: #111827; color: white; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--w); }
#login{position:fixed;inset:0;background:linear-gradient(45deg, #1e3a8a 0%, #3b82f6 100%);display:flex;align-items:center;justify-content:center;z-index:10000}
.login-box{background:rgba(255,255,255,0.15);padding:40px;border-radius:20px;border:2px solid rgba(255,255,255,0.5);backdrop-filter:blur(15px);text-align:center;color:#fff;width:320px}
#login input{padding:12px;border-radius:8px;border:none;margin:15px 0;width:100%;text-align:center;font-size:18px;background:#fff;color:#1e3a8a;font-weight:700}
.login-btn{padding:10px 0;width:100%;border-radius:30px;border:none;background:#fff;color:#1e3a8a;font-weight:700;cursor:pointer}

#app{display:none;flex-direction:column;height:100%}
.top{background:#fff;padding:8px;border-bottom:3px solid var(--p); transition: max-height 0.3s ease-out; overflow: hidden; max-height: 500px;}
.top.collapsed { max-height: 0; padding: 0; border: none; }
.row{display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px}
.fld{display:flex;flex-direction:column}label{font-size:10px;font-weight:700;color:#475569}
input,select{padding:5px;border:1px solid #cbd5e1;border-radius:4px;font-size:13px;outline:0;color:#000}
.bar{background:#e2e8f0;padding:10px;display:flex;gap:8px;align-items:center;overflow-x:auto;white-space:nowrap;border-bottom:2px solid #cbd5e1}
.btn{padding:8px 14px;border:0;border-radius:4px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:4px}

main{flex:1;overflow:auto;padding:8px; background:#fff}
table{border-collapse:collapse;background:#fff; width: auto; min-width: 100%; margin:0 auto; font-size:11px}
th,td{border:1px solid #475569;padding:6px 10px;text-align:center;color:#000; white-space: nowrap;}
th{background:#1e293b;color:#fff; position: sticky; top: 0; z-index: 5;}

/* Roster Printing and Header Styles */
.roster-print-header { 
    display: block; /* ሁሌም እንዲታይ */
    text-align: center; 
    margin-bottom: 15px; 
    padding: 15px;
    background: #fff;
    border-bottom: 2px solid var(--p);
}
.roster-school-title { font-size: 26px; font-weight: 900; color: var(--card-blue); margin: 0; text-transform: uppercase; }
.roster-info-bar { 
    display: flex; 
    justify-content: space-between; 
    border: 1.5px solid #000; 
    padding: 6px 15px; 
    margin-top: 10px; 
    font-weight: bold; 
    background: #f8fafc; 
    font-size: 14px;
}
.roster-footer-sig { display: none; margin-top: 35px; justify-content: space-between; padding: 0 30px; }

@media print {
    @page { size: A4 landscape; margin: 8mm; }
    .btn, .bar, .app-header, .top, .btn-modal-hide, #login, .collapse-trigger, .stats-bar, th:last-child, td:last-child { display: none !important; }
    body { background: white; overflow: visible !important; }
    main { overflow: visible !important; padding: 0; width: 100%; }
    .roster-print-header { border-bottom: none; }
    .roster-footer-sig { display: flex !important; }
    #mainTable { width: 100% !important; border: 1px solid #000 !important; font-size: 10px; }
    #mainTable th, #mainTable td { border: 1px solid #000 !important; padding: 4px 2px !important; }
}

.sub-row{background:#e0f2fe;font-weight:700;color:#1e40af}
.ann-row{background:#f0fdf4;font-weight:700;color:var(--s)}
.stats-bar { display: flex; gap: 20px; padding: 10px; background: #f8fafc; border-top: 1.5px solid #cbd5e1; font-weight: bold; font-size: 13px; }

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;overflow-y:auto;padding:20px}
.card-content{background:#fff; width:195mm; margin:0 auto 20px auto; padding:8mm; border-radius:4px; color:#000; page-break-inside: avoid;}
</style>
</head>
<body>

<div id="login">
    <div class="login-box">
        <h2>DIA ROSTER APP</h2>
        <input type="password" id="passInput" placeholder="Password (1234)">
        <button class="login-btn" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div id="app">
    <div class="app-header">
        <div style="font-weight:900">DIA GRADE PRO</div>
        <div style="display:flex; gap:15px; align-items:center">
            <span>Dev: Taddesse M.</span>
            <button class="btn collapse-trigger" style="background:var(--w); color:#000" onclick="toggleForm()">↕ እጠፍ/ዘርጋ</button>
        </div>
    </div>
    
    <div class="top" id="inputForm">
        <div class="row">
            <input type="text" id="h_s" value="DILIGENT INTELLECTUALS ACADEMY" style="width:250px" oninput="renderTable()">
            <select id="h_m" onchange="handleModeChange()"><option value="semester">Semester</option><option value="quarter" selected>Quarter</option></select>
            <input type="text" id="h_y" value="Academic Year 2018 E.C" style="width:165px" oninput="renderTable()">
            <input type="text" id="h_b" value="Math, English, Amharic, Science, IT" style="width:230px" oninput="saveSubs()">
            <button class="btn" style="background:var(--d)" onclick="location.reload()">LOCK 🔒</button>
        </div>
        <div class="row" style="border-top:1px solid #eee;padding-top:10px">
            <input type="hidden" id="e_id" value="-1">
            <div class="fld"><label>ተ.ቁ (No.)</label><input type="number" id="e_n" style="width:50px"></div>
            <div class="fld"><label>Name</label><input type="text" id="e_m" style="width:160px"></div>
            <div class="fld"><label>Sex</label><select id="e_x"><option>M</option><option>F</option></select></div>
            <div class="fld"><label>Age</label><input type="number" id="e_a" style="width:40px"></div>
            <div class="fld"><label>Term</label><select id="e_t"></select></div>
            <div class="fld"><label>Conduct</label><select id="e_c"><option>A</option><option>B</option><option>C</option><option>D</option></select></div>
            <div class="fld"><label>Absent</label><input type="number" id="e_abs" value="0" style="width:45px"></div>
            <div class="fld"><label>Note</label><input type="text" id="e_com" style="width:100px"></div>
            <div id="subjectInputs" style="display:flex;gap:4px"></div>
            <button class="btn" style="background:var(--s)" id="saveBtn" onclick="saveData()">💾 SAVE</button>
        </div>
        <div class="row" style="background:#fffbeb; padding:5px; border-radius:5px">
            <div class="fld"><label>GRADE</label><input type="text" id="view_g" value="Grade 4" style="width:70px" oninput="updateViewState()"></div>
            <div class="fld"><label>SEC</label><input type="text" id="view_s" value="A" style="width:40px" oninput="updateViewState()"></div>
        </div>
    </div>

    <div class="bar">
        <button class="btn" style="background:#475569" onclick="exportJSON()">📥 BACKUP</button>
        <button class="btn" style="background:#0891b2" onclick="document.getElementById('importFile').click()">📤 RESTORE</button>
        <button class="btn" style="background:#7c3aed" onclick="handlePrintCards()">🗂️ PRINT ALL CARDS</button>
        <button class="btn" style="background:var(--p)" onclick="window.print()">📋 PRINT ROSTER</button>
        <button class="btn" style="background:var(--tg)" onclick="shareSystem()">✈️ SHARE/SEND</button>
        <button class="btn" style="background:var(--s)" onclick="addSubject()">➕ ADD SUBJECT</button>
        <button class="btn" style="background:#8b5cf6" onclick="showRawData()">🚀 GET ALL DATA</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importJSON(event)">
        <input type="text" id="searchQ" placeholder="🔍 ስም ፈልግ..." onkeyup="renderTable()" style="width:150px; flex-shrink:0">
    </div>

    <main id="tableContainer">
        <div class="roster-print-header">
            <h1 id="rp_school" class="roster-school-title"></h1>
            <div style="font-size: 18px; font-weight: bold; margin: 5px 0;">STUDENT PROGRESS ROSTER (ማጠቃለያ ማህደር)</div>
            <div class="roster-info-bar">
                <span id="rp_year"></span>
                <span id="rp_grade"></span>
                <span>Teacher: ____________________</span>
            </div>
        </div>

        <table id="mainTable"></table>

        <div class="roster-footer-sig">
            <div style="text-align: center; font-weight: bold;">____________________<br>Homeroom Teacher</div>
            <div style="text-align: center; font-weight: bold;">____________________<br>Record Officer</div>
            <div style="text-align: center; font-weight: bold;">____________________<br>School Director</div>
        </div>
    </main>

    <div class="stats-bar" id="statsBar">
        <span id="statM">M: 0</span> | <span id="statF">F: 0</span> | <span id="statT">Total: 0</span>
    </div>
</div>

<div id="modal">
    <div style="text-align:center; margin-bottom:15px" class="btn-modal-hide">
        <button class="btn" style="background:var(--d)" onclick="closeModal()">CLOSE</button>
        <button class="btn" style="background:var(--s)" onclick="window.print()">PRINT/PDF</button>
    </div>
    <div id="cardView"></div>
</div>

<script>
const DB_KEY = '_DIA_DATA_V6_FINAL';
const SUB_KEY = '_DIA_SUBS_PERMANENT';
const STATE_KEY = '_DIA_STATE';

let DATA = JSON.parse(localStorage.getItem(DB_KEY)) || [];
let SUBJECTS = [];

function checkLogin() {
    if(document.getElementById('passInput').value === "1234") {
        document.getElementById('login').style.display='none';
        document.getElementById('app').style.display='flex';
        initApp();
    } else alert("Wrong!");
}

function initApp() {
    const savedSubs = localStorage.getItem(SUB_KEY);
    if(savedSubs) document.getElementById('h_b').value = savedSubs;
    const s = JSON.parse(localStorage.getItem(STATE_KEY));
    if(s) { document.getElementById('view_g').value = s.g; document.getElementById('view_s').value = s.s; }
    SUBJECTS = document.getElementById('h_b').value.split(',').map(x => x.trim()).filter(x => x);
    const mode = document.getElementById('h_m').value;
    document.getElementById('e_t').innerHTML = mode === 'semester' ? '<option value="1">Semester 1</option><option value="2">Semester 2</option>' : '<option value="1">Quarter 1</option><option value="2">Quarter 2</option><option value="3">Quarter 3</option><option value="4">Quarter 4</option>';
    document.getElementById('subjectInputs').innerHTML = SUBJECTS.map((s, i) => `<div class="fld"><label>${s}</label><input type="number" class="mark-input" data-subj="${s}" id="m_${i}" style="width:38px;text-align:center" oninput="autoJump(${i})"></div>`).join('');
    renderTable();
}

function renderTable() {
    const vg = document.getElementById('view_g').value, vs = document.getElementById('view_s').value, mode = document.getElementById('h_m').value;
    const school = document.getElementById('h_s').value, year = document.getElementById('h_y').value;
    
    // Header update
    document.getElementById('rp_school').innerText = school;
    document.getElementById('rp_year').innerText = "Year: " + year;
    document.getElementById('rp_grade').innerText = "Grade & Section: " + vg + " " + vs;

    let classData = DATA.filter(d => d.grade === vg && d.sec === vs && d.mode === mode);
    const students = [...new Set(classData.map(d => d.no))].sort((a,b)=>a-b);
    
    let html = `<thead><tr><th>ተ.ቁ</th><th>Name</th><th>Sex</th><th>Term</th>${SUBJECTS.map(s=>`<th>${s}</th>`).join('')}<th>Total</th><th>Avg</th><th>Rank</th><th>Conduct</th><th>Absent</th><th>Act</th></tr></thead><tbody>`;
    
    students.forEach(no => {
        const recs = classData.filter(d => d.no == no).sort((a,b)=>a.term - b.term);
        const span = recs.length + (mode === 'quarter' ? (recs.some(r=>r.term==2)?1:0) + (recs.some(r=>r.term==4)?1:0) : 0) + 1;
        recs.forEach((r, i) => {
            html += `<tr>${i===0?`<td rowspan="${span}">${no}</td><td rowspan="${span}" style="text-align:left">${r.name}</td><td rowspan="${span}">${r.sex}</td>`:''}
                <td>${mode==='quarter'?'Q':'Sem'} ${r.term}</td>${SUBJECTS.map(s=>`<td>${r.marks[s] || 0}</td>`).join('')}
                <td style="font-weight:bold">${r.total.toFixed(0)}</td><td style="font-weight:bold">${r.avg.toFixed(1)}</td>
                <td style="color:var(--p); font-weight:bold">${getRank(r.avg, classData.filter(d=>d.term==r.term).map(d=>d.avg))}</td>
                <td>${r.conduct}</td><td>${r.absent}</td><td><button onclick="editRec(${r.id})">✏️</button></td></tr>`;
            if(mode==='quarter' && r.term == 2) html += renderSubRow(no, vg, vs, [1,2], "SEM 1 AVG", classData);
            if(mode==='quarter' && r.term == 4) html += renderSubRow(no, vg, vs, [3,4], "SEM 2 AVG", classData);
        });
        if(recs.length > 0) html += renderSubRow(no, vg, vs, mode==='quarter'?[1,2,3,4]:[1,2], "ANNUAL", classData, true);
    });
    document.getElementById('mainTable').innerHTML = html + "</tbody>";
    updateStats(students, classData);
}

function getRank(avg, allAvgs) {
    if(!avg || allAvgs.length === 0) return "-";
    const sorted = [...new Set(allAvgs)].sort((a,b) => b-a);
    return (sorted.indexOf(avg) + 1) + "/" + allAvgs.length;
}

function renderSubRow(no, g, s, terms, label, cData, isAnn=false) {
    const recs = cData.filter(d => d.no == no && terms.includes(Number(d.term)));
    if(recs.length === 0) return "";
    const avg = recs.reduce((sum, r) => sum + r.avg, 0) / recs.length;
    const total = recs.reduce((sum, r) => sum + r.total, 0) / recs.length;
    const groupAvgs = [...new Set(cData.map(d=>d.no))].map(id => {
        const sr = cData.filter(d => d.no == id && terms.includes(Number(d.term)));
        return sr.length > 0 ? (sr.reduce((sum, r) => sum + r.avg, 0) / sr.length) : null;
    }).filter(v => v !== null);

    return `<tr class="${isAnn?'ann-row':'sub-row'}"><td>${label}</td>${SUBJECTS.map(sub => `<td>${(recs.reduce((u,r)=>u+(r.marks[sub]||0),0)/recs.length).toFixed(1)}</td>`).join('')}<td>${total.toFixed(0)}</td><td>${avg.toFixed(1)}</td><td style="font-weight:bold">${getRank(avg, groupAvgs)}</td><td>-</td><td>-</td><td>${isAnn?`<button onclick="showCard('${no}','${g}','${s}')">CARD</button>`:'-'}</td></tr>`;
}

function updateStats(students, classData) {
    document.getElementById('statM').innerText = `M: ${students.filter(no => classData.find(d => d.no == no).sex === 'M').length}`;
    document.getElementById('statF').innerText = `F: ${students.filter(no => classData.find(d => d.no == no).sex === 'F').length}`;
    document.getElementById('statT').innerText = `Total: ${students.length}`;
}

function toggleForm() { document.getElementById('inputForm').classList.toggle('collapsed'); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function updateViewState() { localStorage.setItem(STATE_KEY, JSON.stringify({g: document.getElementById('view_g').value, s: document.getElementById('view_s').value})); renderTable(); }
function handleModeChange() { initApp(); }
function autoJump(idx) { if (document.getElementById(`m_${idx}`).value.length >= 2) { const next = document.getElementById(`m_${idx + 1}`); if (next) next.focus(); } }
// የቀረው ዳታ ሴቭ የማድረጊያ እና ሌሎቹ ፈንክሽኖች ከመጀመሪያው ኮድ ጋር ተመሳሳይ ናቸው።
</script>
</body>
</html>
