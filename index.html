<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIA Grade Pro - Professional Edition</title>
<style>
:root{--p:#1e40af;--s:#15803d;--d:#b91c1c;--bg:#f1f5f9;--w:#f59e0b;--card-blue:#1e3a8a;--tg:#0088cc}
*{box-sizing:border-box;font-family:Nyala, 'Segoe UI', sans-serif}
body{margin:0;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.app-header { background: #111827; color: white; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--w); }
#login{position:fixed;inset:0;background:linear-gradient(45deg, #1e3a8a 0%, #3b82f6 100%);display:flex;align-items:center;justify-content:center;z-index:10000}
.login-box{background:rgba(255,255,255,0.15);padding:40px;border-radius:20px;border:2px solid rgba(255,255,255,0.5);backdrop-filter:blur(15px);text-align:center;color:#fff;width:320px}
#login input{padding:12px;border-radius:8px;border:none;margin:15px 0;width:100%;text-align:center;font-size:18px;background:#fff;color:#1e3a8a;font-weight:700}
.login-btn{padding:10px 0;width:100%;border-radius:30px;border:none;background:#fff;color:#1e3a8a;font-weight:700;cursor:pointer}

#app{display:none;flex-direction:column;height:100%}
.top{background:#fff;padding:8px;border-bottom:3px solid var(--p); transition: max-height 0.3s ease-out; overflow: hidden; max-height: 500px;}
.top.collapsed { max-height: 0; padding: 0; border: none; }
.row{display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px}
.fld{display:flex;flex-direction:column}label{font-size:10px;font-weight:700;color:#475569}
input,select{padding:5px;border:1px solid #cbd5e1;border-radius:4px;font-size:13px;outline:0;color:#000}
.bar{background:#e2e8f0;padding:10px;display:flex;gap:8px;align-items:center;overflow-x:auto;white-space:nowrap;border-bottom:2px solid #cbd5e1}
.btn{padding:8px 14px;border:0;border-radius:4px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:4px}

/* ሮስተር ርዕስ (Roster Header Styling) */
.roster-header-print { 
    display: none; text-align: center; margin-bottom: 10px; 
    border: 2px solid var(--p); padding: 10px; background: #fff;
}
.roster-header-print h1 { margin: 0; font-size: 24px; color: var(--card-blue); }
.roster-header-print h2 { margin: 5px 0; font-size: 16px; border-top: 1px solid #ddd; padding-top: 5px; }
.roster-sub-info { display: flex; justify-content: space-around; font-weight: bold; font-size: 13px; margin-top: 5px; }

main{flex:1;overflow:auto;padding:8px; background:#fff}
table{border-collapse:collapse;background:#fff; width: 100%; margin:0 auto; font-size:11px}
th,td{border:1px solid #000;padding:5px 8px;text-align:center;color:#000;}
th{background:#f1f5f9;color:#000; position: sticky; top: 0; z-index: 5; font-weight: 900;}

.sub-row{background:#e0f2fe;font-weight:700;color:#1e40af}
.ann-row{background:#f0fdf4;font-weight:700;color:var(--s)}

@media print {
    @page { size: A4 landscape; margin: 8mm; }
    .btn, .bar, .app-header, .top, .btn-modal-hide, #login, .collapse-trigger, .stats-bar { display: none !important; }
    .roster-header-print { display: block !important; }
    body { background: white; overflow: visible !important; }
    main { overflow: visible !important; padding: 0; }
    table { width: 100% !important; border: 1.5px solid #000 !important; font-size: 9px; }
}

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;overflow-y:auto;padding:20px}
.card-content{background:#fff; width:195mm; margin:0 auto 20px auto; padding:8mm; border: 4px solid var(--card-blue); page-break-after: always;}
</style>
</head>
<body>

<div id="login">
    <div class="login-box">
        <h2>DIA ROSTER APP</h2>
        <input type="password" id="passInput" placeholder="Password (1234)">
        <button class="login-btn" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div id="app">
    <div class="app-header">
        <div style="font-weight:900" id="main_app_title">DIA GRADE PRO</div>
        <div style="display:flex; gap:15px; align-items:center">
            <span>Dev: Taddesse M.</span>
            <button class="btn collapse-trigger" style="background:var(--w); color:#000" onclick="toggleForm()">↕ እጠፍ/ዘርጋ</button>
        </div>
    </div>
    
    <div class="top" id="inputForm">
        <div class="row">
            <div class="fld"><label>School Name</label><input type="text" id="h_s" value="DILIGENT INTELLECTUALS ACADEMY" style="width:250px" oninput="renderTable()"></div>
            <div class="fld"><label>Mode</label><select id="h_m" onchange="handleModeChange()"><option value="semester">Semester</option><option value="quarter" selected>Quarter</option></select></div>
            <div class="fld"><label>Academic Year</label><input type="text" id="h_y" value="Academic Year 2018 E.C" style="width:170px" oninput="renderTable()"></div>
            <div class="fld"><label>Subjects</label><input type="text" id="h_b" value="Math, English, Amharic, Science, IT" style="width:230px" oninput="saveSubs()"></div>
        </div>
        <div class="row" style="border-top:1px solid #eee;padding-top:10px">
            <input type="hidden" id="e_id" value="-1">
            <div class="fld"><label>ተ.ቁ</label><input type="number" id="e_n" style="width:50px"></div>
            <div class="fld"><label>Name</label><input type="text" id="e_m" style="width:160px"></div>
            <div class="fld"><label>Sex</label><select id="e_x"><option>M</option><option>F</option></select></div>
            <div class="fld"><label>Age</label><input type="number" id="e_a" style="width:40px"></div>
            <div class="fld"><label>Term</label><select id="e_t"></select></div>
            <div class="fld"><label>Conduct</label><select id="e_c"><option>A</option><option>B</option><option>C</option><option>D</option></select></div>
            <div class="fld"><label>Absent</label><input type="number" id="e_abs" value="0" style="width:45px"></div>
            <div id="subjectInputs" style="display:flex;gap:4px"></div>
            <button class="btn" style="background:var(--s)" id="saveBtn" onclick="saveData()">💾 SAVE</button>
        </div>
        <div class="row">
            <div class="fld"><label>GRADE</label><input type="text" id="view_g" value="Grade 4" style="width:70px" oninput="renderTable()"></div>
            <div class="fld"><label>SECTION</label><input type="text" id="view_s" value="A" style="width:50px" oninput="renderTable()"></div>
        </div>
    </div>

    <div class="bar">
        <button class="btn" style="background:var(--p)" onclick="window.print()">📋 PRINT ROSTER</button>
        <button class="btn" style="background:#7c3aed" onclick="handlePrintCards()">🗂️ PRINT ALL CARDS</button>
        <button class="btn" style="background:#475569" onclick="exportJSON()">📥 BACKUP</button>
        <input type="text" id="searchQ" placeholder="🔍 ስም ፈልግ..." onkeyup="renderTable()" style="width:150px; margin-left:auto">
    </div>

    <main id="tableContainer">
        <div class="roster-header-print">
            <h1 id="p_school"></h1>
            <h2>STUDENT PROGRESS ROSTER (ማጠቃለያ ማህደር)</h2>
            <div class="roster-sub-info">
                <span id="p_year"></span>
                <span id="p_grade"></span>
                <span>Teacher: ____________________</span>
            </div>
        </div>
        <table id="mainTable"></table>
    </main>

    <div class="stats-bar" id="statsBar" style="padding:10px; background:#111827; color:#fff; font-weight:bold; font-size:13px;"></div>
</div>

<div id="modal">
    <div style="text-align:center; margin-bottom:15px" class="btn-modal-hide">
        <button class="btn" style="background:var(--d)" onclick="closeModal()">CLOSE</button>
        <button class="btn" style="background:var(--s)" onclick="window.print()">PRINT/PDF</button>
    </div>
    <div id="cardView"></div>
</div>

<script>
const DB_KEY = '_DIA_DATA_V6_FINAL';
const SUB_KEY = '_DIA_SUBS_PERMANENT';
let DATA = JSON.parse(localStorage.getItem(DB_KEY)) || [];
let SUBJECTS = [];

function checkLogin() {
    if(document.getElementById('passInput').value === "1234") {
        document.getElementById('login').style.display='none';
        document.getElementById('app').style.display='flex';
        initApp();
    } else alert("Wrong!");
}

function initApp() {
    const savedSubs = localStorage.getItem(SUB_KEY);
    if(savedSubs) document.getElementById('h_b').value = savedSubs;
    SUBJECTS = document.getElementById('h_b').value.split(',').map(x => x.trim()).filter(x => x);
    const mode = document.getElementById('h_m').value;
    document.getElementById('e_t').innerHTML = mode === 'semester' 
        ? '<option value="1">Semester 1</option><option value="2">Semester 2</option>' 
        : '<option value="1">Quarter 1</option><option value="2">Quarter 2</option><option value="3">Quarter 3</option><option value="4">Quarter 4</option>';
    document.getElementById('subjectInputs').innerHTML = SUBJECTS.map((s, i) => `
        <div class="fld"><label>${s}</label><input type="number" class="mark-input" data-subj="${s}" id="m_${i}" style="width:38px;text-align:center" oninput="autoJump(${i})"></div>
    `).join('');
    renderTable();
}

function autoJump(idx) {
    if (document.getElementById(`m_${idx}`).value.length >= 2) {
        const next = document.getElementById(`m_${idx + 1}`);
        if (next) next.focus();
    }
}

function saveData() {
    const name = document.getElementById('e_m').value.trim();
    if(!name) return alert("Enter Name!");
    let marks = {}, total = 0;
    document.querySelectorAll('.mark-input').forEach(inp => {
        let val = parseFloat(inp.value) || 0;
        marks[inp.dataset.subj] = val;
        total += val;
    });
    const entry = {
        id: document.getElementById('e_id').value !== "-1" ? parseFloat(document.getElementById('e_id').value) : Date.now(),
        no: parseInt(document.getElementById('e_n').value),
        name, sex: document.getElementById('e_x').value, age: document.getElementById('e_a').value,
        grade: document.getElementById('view_g').value, sec: document.getElementById('view_s').value,
        mode: document.getElementById('h_m').value, term: parseInt(document.getElementById('e_t').value),
        conduct: document.getElementById('e_c').value, absent: document.getElementById('e_abs').value,
        marks, total, avg: total / SUBJECTS.length
    };
    const idx = DATA.findIndex(d => d.id === entry.id);
    if(idx > -1) DATA[idx] = entry; else DATA.push(entry);
    localStorage.setItem(DB_KEY, JSON.stringify(DATA));
    resetForm(); renderTable();
}

function resetForm() {
    document.getElementById('e_id').value = "-1";
    document.getElementById('e_m').value = "";
    document.querySelectorAll('.mark-input').forEach(i => i.value = "");
    document.getElementById('e_m').focus();
}

function renderTable() {
    const vg = document.getElementById('view_g').value, vs = document.getElementById('view_s').value, mode = document.getElementById('h_m').value;
    const year = document.getElementById('h_y').value;
    const school = document.getElementById('h_s').value;
    const search = document.getElementById('searchQ').value.toLowerCase();
    
    // ርዕሶችን አዘጋጅ
    document.getElementById('p_school').innerText = school;
    document.getElementById('p_year').innerText = year;
    document.getElementById('p_grade').innerText = "Grade: " + vg + " (" + vs + ")";

    let classData = DATA.filter(d => d.grade === vg && d.sec === vs && d.mode === mode);
    if(search) classData = classData.filter(d => d.name.toLowerCase().includes(search));
    const students = [...new Set(classData.map(d => d.no))].sort((a,b)=>a-b);
    
    document.getElementById('statsBar').innerText = `M: ${students.filter(n=>classData.find(d=>d.no==n).sex==='M').length} | F: ${students.filter(n=>classData.find(d=>d.no==n).sex==='F').length} | Total: ${students.length}`;

    let html = `<thead><tr><th>ተ.ቁ</th><th>Student Name</th><th>Sex</th><th>Age</th><th>Term</th>${SUBJECTS.map(s=>`<th>${s}</th>`).join('')}<th>Total</th><th>Avg</th><th>Rank</th><th>Conduct</th><th>Abs</th><th>Act</th></tr></thead><tbody>`;
    
    students.forEach(no => {
        const recs = classData.filter(d => d.no == no).sort((a,b)=>a.term - b.term);
        const span = recs.length + (mode === 'quarter' ? (recs.some(r=>r.term==2)?1:0) + (recs.some(r=>r.term==4)?1:0) : 0) + 1;
        
        recs.forEach((r, i) => {
            const tAvgs = classData.filter(d => d.term == r.term).map(d => d.avg);
            html += `<tr>
                ${i===0?`<td rowspan="${span}">${no}</td><td rowspan="${span}" style="text-align:left; font-weight:bold">${r.name}</td><td rowspan="${span}">${r.sex}</td><td rowspan="${span}">${r.age}</td>`:''}
                <td>${mode==='quarter'?'Q':'Sem'} ${r.term}</td>${SUBJECTS.map(s=>`<td>${r.marks[s] || 0}</td>`).join('')}
                <td>${r.total.toFixed(0)}</td><td>${r.avg.toFixed(1)}</td><td>${getRank(r.avg, tAvgs)}</td><td>${r.conduct}</td><td>${r.absent}</td>
                <td><button onclick="editRec(${r.id})">✏️</button></td></tr>`;
            
            if(mode==='quarter' && r.term == 2) html += renderSummaryRow(no, [1,2], "SEM 1", classData);
            if(mode==='quarter' && r.term == 4) html += renderSummaryRow(no, [3,4], "SEM 2", classData);
        });
        if(recs.length > 0) html += renderSummaryRow(no, mode==='quarter'?[1,2,3,4]:[1,2], "ANNUAL", classData, true);
    });
    document.getElementById('mainTable').innerHTML = html + "</tbody>";
}

function renderSummaryRow(no, terms, label, cData, isAnn=false) {
    const recs = cData.filter(d => d.no == no && terms.includes(d.term));
    if(recs.length === 0) return "";
    const avg = recs.reduce((sum, r) => sum + r.avg, 0) / recs.length;
    const allAvgs = [...new Set(cData.map(d => d.no))].map(id => {
        const sr = cData.filter(d => d.no == id && terms.includes(d.term));
        return sr.length > 0 ? (sr.reduce((s,r)=>s+r.avg,0)/sr.length) : null;
    }).filter(v => v !== null);

    return `<tr class="${isAnn?'ann-row':'sub-row'}"><td>${label}</td>${SUBJECTS.map(sub => `<td>${(recs.reduce((u,r)=>u+(r.marks[sub]||0),0)/recs.length).toFixed(1)}</td>`).join('')}<td>${(recs.reduce((s,r)=>s+r.total,0)/recs.length).toFixed(0)}</td><td>${avg.toFixed(1)}</td><td style="font-weight:bold">${getRank(avg, allAvgs)}</td><td>-</td><td>-</td><td>-</td></tr>`;
}

function getRank(avg, allAvgs) {
    if(!avg || allAvgs.length === 0) return "-";
    const sorted = [...new Set(allAvgs)].sort((a,b) => b-a);
    return (sorted.indexOf(avg) + 1) + "/" + allAvgs.length;
}

function editRec(id) {
    const r = DATA.find(d => d.id === id);
    if(!r) return;
    document.getElementById('e_id').value = r.id;
    document.getElementById('e_n').value = r.no;
    document.getElementById('e_m').value = r.name;
    document.getElementById('e_x').value = r.sex;
    document.getElementById('e_a').value = r.age;
    document.getElementById('e_t').value = r.term;
    document.getElementById('e_c').value = r.conduct;
    document.getElementById('e_abs').value = r.absent;
    SUBJECTS.forEach((s, i) => { document.getElementById(`m_${i}`).value = r.marks[s] || 0; });
    document.getElementById('inputForm').classList.remove('collapsed');
}

function handlePrintCards() {
    const vg = document.getElementById('view_g').value, vs = document.getElementById('view_s').value;
    const ids = [...new Set(DATA.filter(d => d.grade === vg && d.sec === vs).map(d => d.no))].sort((a,b)=>a-b);
    document.getElementById('cardView').innerHTML = ids.map(id => buildCardHTML(id, vg, vs)).join('');
    document.getElementById('modal').style.display = 'block';
}

function buildCardHTML(no, g, s) {
    const recs = DATA.filter(d => d.no == no && d.grade === g && d.sec === s).sort((a,b)=>a.term-b.term);
    if(recs.length === 0) return "";
    const avg = recs.reduce((sum, r) => sum + r.avg, 0) / recs.length;
    return `<div class="card-content">
        <h1 style="text-align:center; color:var(--card-blue)">${document.getElementById('h_s').value}</h1>
        <h3 style="text-align:center; border-bottom:2px solid #000">STUDENT PROGRESS CARD</h3>
        <p><b>Name:</b> ${recs[0].name} &nbsp; <b>Sex:</b> ${recs[0].sex} &nbsp; <b>Grade:</b> ${g}-${s}</p>
        <table style="width:100%; border-collapse:collapse" border="1">
            <tr style="background:#eee"><th>Subject</th><th>Avg Mark</th></tr>
            ${SUBJECTS.map(sub => `<tr><td>${sub}</td><td>${(recs.reduce((u,r)=>u+(r.marks[sub]||0),0)/recs.length).toFixed(1)}</td></tr>`).join('')}
            <tr style="background:#f0fdf4; font-weight:bold"><td>ANNUAL AVERAGE</td><td>${avg.toFixed(1)}</td></tr>
        </table>
        <div style="margin-top:20px; display:flex; justify-content:space-between">
            <span>Conduct: ${recs[recs.length-1].conduct}</span>
            <span>Signature: ________________</span>
        </div>
    </div>`;
}

function exportJSON() {
    const blob = new Blob([JSON.stringify(DATA)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `DIA_Backup.json`;
    a.click();
}

function toggleForm() { document.getElementById('inputForm').classList.toggle('collapsed'); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function handleModeChange() { initApp(); }
function saveSubs() { localStorage.setItem(SUB_KEY, document.getElementById('h_b').value); initApp(); }
</script>
</body>
</html>
