<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIA Grade Pro - Official System</title>
<style>
:root{--p:#1e40af;--s:#15803d;--d:#b91c1c;--bg:#f1f5f9;--w:#f59e0b;--card-blue:#1e3a8a}
*{box-sizing:border-box;font-family:Nyala, 'Segoe UI', sans-serif}
body{margin:0;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.app-header { background: #111827; color: white; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--w); }
#login{position:fixed;inset:0;background:linear-gradient(45deg, #1e3a8a 0%, #3b82f6 100%);display:flex;align-items:center;justify-content:center;z-index:10000}
.login-box{background:rgba(255,255,255,0.15);padding:40px;border-radius:20px;border:2px solid rgba(255,255,255,0.5);backdrop-filter:blur(15px);text-align:center;color:#fff;width:360px}
#login input{padding:12px;border-radius:8px;border:none;margin:15px 0;width:100%;text-align:center;font-size:18px;background:#fff;color:#1e3a8a;font-weight:700}
.login-btn{padding:10px 0;width:100%;border-radius:30px;border:none;background:#fff;color:#1e3a8a;font-weight:700;cursor:pointer}

#app{display:none;flex-direction:column;height:100%}
.top{background:#fff;padding:8px;border-bottom:3px solid var(--p); transition: max-height 0.3s ease-out; overflow: hidden; max-height: 500px;}
.top.collapsed { max-height: 0; padding: 0; border: none; }

.row{display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px}
.fld{display:flex;flex-direction:column}label{font-size:10px;font-weight:700;color:#475569}
input,select{padding:5px;border:1px solid #cbd5e1;border-radius:4px;font-size:13px;outline:0;color:#000}

/* የተስተካከለው የሚንሸራተት ባር (Bar) */
.bar {
    background: #e2e8f0;
    padding: 8px;
    display: flex;
    gap: 10px;
    align-items: center;
    overflow-x: auto; /* ወደ ጎን እንዲንሸራተት */
    white-space: nowrap; /* በተኖቹ ወደ ታች እንዳይወርዱ */
    -webkit-overflow-scrolling: touch; /* ለሞባይል ልዝብ ንክኪ */
    border-bottom: 1px solid #cbd5e1;
}
/* የመንሸራተቻው መስመር ቀጭን እንዲሆን */
.bar::-webkit-scrollbar { height: 5px; }
.bar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }

.btn{padding:6px 12px;border:0;border-radius:4px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:4px; flex-shrink: 0; /* እንዳይኮማተሩ */}

main{flex:1;overflow:auto;padding:8px; background:#fff}
table{border-collapse:collapse;background:#fff; width: auto; min-width: 100%; margin:0 auto; font-size:11px}
th,td{border:1px solid #475569;padding:6px 10px;text-align:center;color:#000; white-space: nowrap;}
th{background:#1e293b;color:#fff; position: sticky; top: 0; z-index: 5;}
.sub-row{background:#e0f2fe;font-weight:700;color:#1e40af}
.ann-row{background:#f0fdf4;font-weight:700;color:var(--s)}

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;overflow-y:auto;padding:20px}
.card-content{background:#fff; width:210mm; margin:0 auto 20px auto; padding:10px; border-radius:2px; box-shadow:0 0 15px rgba(0,0,0,0.5); color:#000; page-break-inside: avoid;}
.main-card-border{border:2px solid var(--card-blue);padding:10px;display:flex;flex-direction:column}
.card-header-box { text-align:center; border-bottom: 2px solid var(--card-blue); padding-bottom: 5px; margin-bottom: 5px; }
.card-title-main { font-size: 22px; font-weight: 900; color: var(--card-blue); margin:0; }
.card-subtitle-badge { border: 1.5px solid var(--card-blue); display: inline-block; padding: 1px 15px; border-radius: 20px; font-weight: bold; font-size: 13px; margin: 3px 0; }
.info-grid{display:grid;grid-template-columns: 1fr 1fr 1.2fr; border: 1.5px solid var(--card-blue); margin-bottom: 5px; font-size: 13px;}
.info-grid div { padding: 4px; border: 0.5px solid #eee; border-right: 1.5px solid var(--card-blue); }
.card-table { width: 100%; border-collapse: collapse; border: 2px solid var(--card-blue); }
.card-table th { border: 1.5px solid var(--card-blue); padding: 3px; background: #fff; color: var(--card-blue); font-size: 10px; }
.card-table td { border: 1px solid #ccc; padding: 3px; text-align: center; font-weight: bold; font-size: 11px; }
.comment-section { border: 1.5px solid var(--card-blue); margin-top: 5px; padding: 5px; font-size: 12px; min-height: 40px; background: #f8fafc; }
.decision-box { border: 1.5px solid var(--s); background: #f0fdf4; padding: 8px; margin-top: 5px; text-align: center; font-weight: bold; border-radius: 8px; font-size: 13px; color: var(--s); }
.fail-box { border: 1.5px solid var(--d); background: #fef2f2; color: var(--d); }
.footer-sig { display: flex; justify-content: space-between; margin-top: 15px; padding: 10px; font-size: 11px; font-weight: bold; }
.sig-line { border-top: 1.5px dotted #000; width: 120px; margin-bottom: 3px; }

@media print {
    .btn, .bar, .app-header, .top, .btn-modal-hide, #login, th:last-child, td:last-child, .collapse-trigger { display: none !important; }
    body { background: white; overflow: visible !important; }
    main { overflow: visible !important; padding: 0; }
    table { width: 100% !important; border: 1px solid #000; font-size: 9px; table-layout: auto; }
    th, td { white-space: normal !important; padding: 4px 2px; }
    .card-content { page-break-after: always; box-shadow: none; border: none; margin: 0; width: 100%; padding: 0; }
    @page { size: A4 landscape; margin: 5mm; }
}
</style>
</head>
<body>

<div id="login">
    <div class="login-box">
        <h2>DIA ROSTER APP</h2>
        <input type="password" id="passInput" placeholder="Password (1234)">
        <button class="login-btn" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div id="app">
    <div class="app-header">
        <div style="font-weight:900">DIA GRADE PRO</div>
        <div style="display:flex; gap:15px; align-items:center">
            <span>Developer: Taddesse Misganaw</span>
            <button class="btn collapse-trigger" style="background:var(--w); color:#000" onclick="toggleForm()">↕ እጠፍ/ዘርጋ</button>
        </div>
    </div>
    
    <div class="top" id="inputForm">
        <div class="row">
            <input type="text" id="h_s" value="DILIGENT INTELLECTUALS ACADEMY" style="width:250px">
            <select id="h_m" onchange="handleModeChange()"><option value="semester">Semester</option><option value="quarter" selected>Quarter</option></select>
            <input type="text" id="h_y" value="2018 E.C" style="width:80px">
            <input type="text" id="h_b" value="Math, English, Amharic, Science, IT" style="width:230px" onchange="initApp()">
            <button class="btn" style="background:var(--s)" onclick="addSubject()">+ ጨምር</button>
            <button class="btn" style="background:var(--d)" onclick="location.reload()">LOCK 🔒</button>
        </div>
        <div class="row" style="border-top:1px solid #eee;padding-top:10px">
            <input type="hidden" id="e_id" value="-1">
            <div class="fld"><label>ID (ተራ ቁጥር)</label><input type="number" id="e_n" style="width:65px" readonly></div>
            <div class="fld"><label>ተማሪ ስም / Name</label><input type="text" id="e_m" style="width:160px"></div>
            <div class="fld"><label>ጾታ / Sex</label><select id="e_x"><option>Male</option><option>Female</option></select></div>
            <div class="fld"><label>ዕድሜ / Age</label><input type="number" id="e_a" style="width:45px"></div>
            <div class="fld"><label>ወቅት / Term</label><select id="e_t"></select></div>
            <div class="fld"><label>ፀባይ / Conduct</label><select id="e_c"><option>A</option><option>B</option><option>C</option><option>D</option></select></div>
            <div class="fld"><label>ማሳሰቢያ / Note</label><input type="text" id="e_com" style="width:120px"></div>
            <div id="subjectInputs" style="display:flex;gap:4px"></div>
            <button class="btn" style="background:var(--s)" id="saveBtn" onclick="saveData()">💾 SAVE</button>
        </div>
        <div class="row" style="background:#fffbeb; padding:5px; border-radius:5px">
            <div class="fld"><label>VIEW GRADE</label><input type="text" id="view_g" value="Grade 4" style="width:70px" oninput="updateViewState()"></div>
            <div class="fld"><label>SEC</label><input type="text" id="view_s" value="A" style="width:40px" oninput="updateViewState()"></div>
        </div>
    </div>

    <div class="bar">
        <button class="btn" style="background:#475569" onclick="exportJSON()">📥 BACKUP</button>
        <button class="btn" style="background:#0891b2" onclick="document.getElementById('importFile').click()">📤 RESTORE</button>
        <button class="btn" style="background:#7c3aed" onclick="showAllCards()">🗂️ PRINT ALL CARDS</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importJSON(event)">
        <button class="btn" style="background:var(--p)" onclick="window.print()">📋 PRINT ROSTER</button>
        <button class="btn" style="background:var(--d)" onclick="clearAllData()">⚠️ CLEAR ALL</button>
        <div style="flex-grow: 1;"></div> <input type="text" id="searchQ" placeholder="🔍 ስም ፈልግ..." onkeyup="renderTable()" style="width:180px; flex-shrink: 0;">
    </div>
    
    <main id="tableContainer"><table id="mainTable"></table></main>
</div>

<div id="modal">
    <div style="text-align:center; margin-bottom:15px" class="btn-modal-hide">
        <button class="btn" style="background:var(--d)" onclick="closeModal()">CLOSE</button>
        <button class="btn" style="background:var(--s)" onclick="window.print()">PRINT/PDF</button>
    </div>
    <div id="cardView"></div>
</div>

<script>
// ቀሪው የጃቫስክሪፕት ኮድህ እንዳለ ይቀጥላል...
const DB_KEY = '_DIA_DATA_FINAL_V5_STABLE';
const STATE_KEY = '_DIA_LAST_STATE';
let DATA = JSON.parse(localStorage.getItem(DB_KEY)) || [];
let SUBJECTS = [];

function toggleForm() { document.getElementById('inputForm').classList.toggle('collapsed'); }

function checkLogin() {
    if(document.getElementById('passInput').value === "1234") {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadLastState();
        initApp();
    } else alert("Incorrect Password!");
}

function updateViewState() {
    localStorage.setItem(STATE_KEY, JSON.stringify({
        g: document.getElementById('view_g').value,
        s: document.getElementById('view_s').value
    }));
    updateNextID();
    renderTable();
}

function loadLastState() {
    const state = JSON.parse(localStorage.getItem(STATE_KEY));
    if(state) {
        document.getElementById('view_g').value = state.g;
        document.getElementById('view_s').value = state.s;
    }
}

function updateNextID() {
    const vg = document.getElementById('view_g').value;
    const vs = document.getElementById('view_s').value;
    const classData = DATA.filter(d => d.grade === vg && d.sec === vs);
    const maxID = classData.length > 0 ? Math.max(...classData.map(d => parseInt(d.no) || 0)) : 0;
    document.getElementById('e_n').value = maxID + 1;
}

function handleModeChange() { initApp(); renderTable(); }

function initApp() {
    SUBJECTS = document.getElementById('h_b').value.split(',').map(s => s.trim()).filter(s => s);
    const mode = document.getElementById('h_m').value;
    document.getElementById('e_t').innerHTML = mode === 'semester' 
        ? '<option value="1">S1</option><option value="2">S2</option>'
        : '<option value="1">Q1</option><option value="2">Q2</option><option value="3">Q3</option><option value="4">Q4</option>';
    
    document.getElementById('subjectInputs').innerHTML = SUBJECTS.map((s, i) => `
        <div class="fld"><label>${s}</label><input type="number" class="mark-input" data-subj="${s}" id="m_${i}" oninput="handleAutoMove(this, ${i})" style="width:38px;text-align:center"></div>
    `).join('');
    updateNextID();
    renderTable();
}

function handleAutoMove(el, idx) {
    if (el.value.length >= 2) {
        let next = document.getElementById(`m_${idx + 1}`);
        if (next) next.focus();
    }
}

function getRank(avg, allAvgs) {
    if (!avg || allAvgs.length === 0) return "-";
    const sorted = [...new Set(allAvgs)].sort((a, b) => b - a);
    return (sorted.indexOf(avg) + 1) + "/" + allAvgs.length;
}

function renderTable() {
    const table = document.getElementById('mainTable');
    const mode = document.getElementById('h_m').value;
    const vg = document.getElementById('view_g').value;
    const vs = document.getElementById('view_s').value;
    const q = document.getElementById('searchQ').value.toLowerCase();
    const classData = DATA.filter(d => d.grade === vg && d.sec === vs && d.mode === mode);
    const filteredData = classData.filter(d => d.name.toLowerCase().includes(q));
    const ids = [...new Set(filteredData.map(d => d.no))].sort((a,b)=>a-b);
    
    let html = `<thead><tr><th>ID</th><th>Name</th><th>Sex</th><th>Age</th><th>Term</th>${SUBJECTS.map(s => `<th>${s}</th>`).join('')}<th>Total</th><th>Avg</th><th>Rank</th><th>Act</th></tr></thead><tbody>`;
    
    ids.forEach((no) => {
        const recs = filteredData.filter(d => d.no == no).sort((a,b) => a.term - b.term);
        const totalSpan = recs.length + (mode === 'quarter' ? (recs.some(r=>r.term==2)?1:0) + (recs.some(r=>r.term==4)?1:0) : 0) + 1;
        
        recs.forEach((r, idx) => {
            const termAvgs = classData.filter(d => d.term == r.term).map(d => d.avg);
            html += `<tr>`;
            if(idx === 0) html += `<td rowspan="${totalSpan}">${r.no}</td><td rowspan="${totalSpan}" style="text-align:left">${r.name}</td><td rowspan="${totalSpan}">${r.sex}</td><td rowspan="${totalSpan}">${r.age}</td>`;
            html += `<td>${mode==='quarter'?'Q':'S'}${r.term}</td>${SUBJECTS.map(s => `<td>${r.marks[s] || 0}</td>`).join('')}<td>${r.total.toFixed(0)}</td><td>${r.avg.toFixed(1)}</td><td style="font-weight:bold; color:var(--p)">${getRank(r.avg, termAvgs)}</td>
            <td><button onclick="editRec(${r.id})">✏️</button><button onclick="delRec(${r.id})">🗑️</button></td></tr>`;
            if(mode==='quarter' && r.term == 2) html += renderSubRow(no, vg, vs, [1,2], "SEM 1 AVG", classData);
            if(mode==='quarter' && r.term == 4) html += renderSubRow(no, vg, vs, [3,4], "SEM 2 AVG", classData);
        });
        if(recs.length > 0) html += renderSubRow(no, vg, vs, mode==='quarter'?[1,2,3,4]:[1,2], "ANNUAL", classData, true);
    });
    table.innerHTML = html + `</tbody>`;
}

function renderSubRow(no, g, s, terms, label, cData, isAnn=false) {
    const recs = cData.filter(d => d.no == no && terms.includes(Number(d.term)));
    if(recs.length === 0) return "";
    const avg = recs.reduce((sum, r) => sum + r.avg, 0) / recs.length;
    const tTotal = recs.reduce((sum, r) => sum + r.total, 0) / recs.length;
    const allIds = [...new Set(cData.map(d => d.no))];
    const allGroupAvgs = allIds.map(id => {
        const sr = cData.filter(d => d.no == id && terms.includes(Number(d.term)));
        return sr.length > 0 ? (sr.reduce((sum, r) => sum + r.avg, 0) / sr.length) : null;
    }).filter(v => v !== null);
    
    return `<tr class="${isAnn?'ann-row':'sub-row'}"><td>${label}</td>${SUBJECTS.map(sub => `<td>${(recs.reduce((u,r)=>u+(r.marks[sub]||0),0)/recs.length).toFixed(1)}</td>`).join('')}<td>${tTotal.toFixed(1)}</td><td>${avg.toFixed(1)}</td><td style="font-weight:bold">${getRank(avg, allGroupAvgs)}</td><td>${isAnn?`<button class="btn" style="background:var(--p)" onclick="showCard('${no}','${g}','${s}')">CARD</button>`:'-'}</td></tr>`;
}

function saveData() {
    const idNum = document.getElementById('e_n').value.trim();
    const nameVal = document.getElementById('e_m').value.trim();
    const ageVal = parseInt(document.getElementById('e_a').value);
    const mode = document.getElementById('h_m').value;
    const term = parseInt(document.getElementById('e_t').value);
    const idVal = document.getElementById('e_id').value;
    
    if(!idNum || !nameVal || isNaN(ageVal)) { alert("⚠️ መረጃዎችን ይሙሉ።"); return; }

    let marks = {}, total = 0;
    document.querySelectorAll('.mark-input').forEach(inp => {
        let v = parseFloat(inp.value) || 0;
        marks[inp.dataset.subj] = v; total += v;
    });

    const entry = {
        id: idVal === "-1" ? Date.now() : parseFloat(idVal),
        no: idNum, name: nameVal, sex: document.getElementById('e_x').value, age: ageVal,
        grade: document.getElementById('view_g').value, sec: document.getElementById('view_s').value,
        mode: mode, term: term, conduct: document.getElementById('e_c').value, comment: document.getElementById('e_com').value,
        marks: marks, total: total, avg: total / SUBJECTS.length
    };

    if(idVal === "-1") DATA.push(entry);
    else DATA[DATA.findIndex(d => d.id == idVal)] = entry;

    localStorage.setItem(DB_KEY, JSON.stringify(DATA));
    
    if(term < (mode==='semester'?2:4) && idVal === "-1") {
        document.getElementById('e_t').value = term + 1;
        document.querySelectorAll('.mark-input').forEach(i => i.value="");
        document.getElementById('m_0').focus();
    } else {
        ['e_m','e_a','e_id','e_com'].forEach(id => document.getElementById(id).value = (id==='e_id'?'-1':''));
        document.querySelectorAll('.mark-input').forEach(i => i.value="");
        updateNextID();
        document.getElementById('e_m').focus();
    }
    renderTable();
}

function editRec(id) {
    const r = DATA.find(d => d.id == id);
    if(!r) return;
    document.getElementById('inputForm').classList.remove('collapsed');
    document.getElementById('e_id').value = r.id;
    document.getElementById('e_n').value = r.no;
    document.getElementById('e_m').value = r.name;
    document.getElementById('e_a').value = r.age;
    document.getElementById('e_t').value = r.term;
    document.getElementById('e_c').value = r.conduct;
    document.getElementById('e_com').value = r.comment;
    SUBJECTS.forEach((s, i) => document.getElementById(`m_${i}`).value = r.marks[s] || 0);
}

function buildCardHTML(no, g, s, classData) {
    const recs = classData.filter(d => d.no == no).sort((a,b) => a.term - b.term);
    if(recs.length === 0) return "";
    const schoolName = document.getElementById('h_s').value;
    const year = document.getElementById('h_y').value;
    const allIds = [...new Set(classData.map(d => d.no))];
    const finalAvg = recs.reduce((sum, r) => sum + r.avg, 0) / recs.length;
    const isPass = finalAvg >= 50;
    
    let tableHtml = `<table class="card-table"><thead><tr><th rowspan="2">SUBJECTS</th><th colspan="3">SEMESTER 1</th><th colspan="3">SEMESTER 2</th><th rowspan="2">ANNUAL</th></tr><tr><th>Q1</th><th>Q2</th><th>AVG</th><th>Q3</th><th>Q4</th><th>AVG</th></tr></thead><tbody>`;
    SUBJECTS.forEach(sub => {
        const q = [1,2,3,4].map(t => recs.find(r=>r.term==t)?.marks[sub] ?? "-");
        const s1 = (typeof q[0]==='number'&&typeof q[1]==='number')?((q[0]+q[1])/2).toFixed(1):"-";
        const s2 = (typeof q[2]==='number'&&typeof q[3]==='number')?((q[2]+q[3])/2).toFixed(1):"-";
        const ann = (recs.reduce((u,r)=>u+(r.marks[sub]||0),0)/recs.length).toFixed(1);
        tableHtml += `<tr><td style="text-align:left">${sub}</td><td>${q[0]}</td><td>${q[1]}</td><td>${s1}</td><td>${q[2]}</td><td>${q[3]}</td><td>${s2}</td><td>${ann}</td></tr>`;
    });
    ['TOTAL', 'AVERAGE', 'RANK', 'CONDUCT'].forEach(m => {
        tableHtml += `<tr><td style="text-align:left; color:var(--card-blue); font-weight:900">${m}</td>`;
        [1, 2, 'S1', 3, 4, 'S2'].forEach(t => {
            let val = "-";
            const terms = (t === 'S1') ? [1,2] : (t === 'S2' ? [3,4] : [t]);
            const sRecs = recs.filter(r => terms.includes(r.term));
            if (sRecs.length > 0) {
                const sAvg = sRecs.reduce((sum, r) => sum + r.avg, 0) / sRecs.length;
                if (m === 'TOTAL') val = sRecs.reduce((sum, r) => sum + r.total, 0).toFixed(0);
                else if (m === 'AVERAGE') val = sAvg.toFixed(1);
                else if (m === 'CONDUCT') val = sRecs[sRecs.length-1].conduct;
                else val = getRank(sAvg, allIds.map(id => {
                    const sr = classData.filter(d => d.no == id && terms.includes(d.term));
                    return sr.length > 0 ? (sr.reduce((sum, r) => sum + r.avg, 0) / sr.length) : null;
                }).filter(v => v !== null));
            }
            tableHtml += `<td>${val}</td>`;
        });
        const annRank = getRank(finalAvg, allIds.map(id => {
            const r = classData.filter(d => d.no == id);
            return r.reduce((sum, x) => sum + x.avg, 0) / r.length;
        }));
        let annVal = (m === 'TOTAL') ? (recs.reduce((s, r) => s + r.total, 0) / recs.length).toFixed(0) : (m === 'AVERAGE' ? finalAvg.toFixed(1) : (m === 'CONDUCT' ? recs[recs.length-1].conduct : annRank));
        tableHtml += `<td style="background:#f0fdf4">${annVal}</td></tr>`;
    });
    return `<div class="card-content"><div class="main-card-border"><div class="card-header-box"><h1 class="card-title-main">${schoolName}</h1><div class="card-subtitle-badge">STUDENT PROGRESS REPORT CARD</div><div>${year}</div></div><div class="info-grid"><div>Name: <b>${recs[0].name}</b></div><div>Age: <b>${recs[0].age}</b></div><div>Grade: <b>${g}-${s}</b></div><div>ID: <b>${no}</b></div><div>Sex: <b>${recs[0].sex}</b></div><div>Year: <b>${year}</b></div></div>${tableHtml}</tbody></table><div class="comment-section"><b>Teacher's Comment:</b> ${finalAvg >= 50 ? 'በጣም ጥሩ ውጤት ነው፤ በርታ/ቺ።' : 'ደካማ ውጤት ነው፤ ጥረት ያስፈልጋል።'}</div><div class="decision-box ${!isPass?'fail-box':''}">ይህ/ቺ ተማሪ በ${year} አማካኝ ውጤት <b>${finalAvg.toFixed(1)}</b> በማስመዝገብ ከ <b>${g}</b> ወደ ቀጣዩ ክፍል <b>${isPass?'ተዘዋውሯል/ች':'አልተዘዋወረም/ችም'}</b>።</div><div class="footer-sig"><div><div class="sig-line"></div>Parent Signature</div><div><div class="sig-line"></div>Teacher Signature</div><div><div class="sig-line"></div>Principal Signature</div></div></div></div>`;
}

function showCard(no, g, s) { const classData = DATA.filter(d => d.grade === g && d.sec === s); document.getElementById('cardView').innerHTML = buildCardHTML(no, g, s, classData); document.getElementById('modal').style.display = 'block'; }
function showAllCards() { const vg = document.getElementById('view_g').value; const vs = document.getElementById('view_s').value; const classData = DATA.filter(d => d.grade === vg && d.sec === vs); const allIds = [...new Set(classData.map(d => d.no))]; if (allIds.length === 0) return alert("ዳታ የለም!"); let html = ""; allIds.forEach(id => html += buildCardHTML(id, vg, vs, classData)); document.getElementById('cardView').innerHTML = html; document.getElementById('modal').style.display = 'block'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function delRec(id) { if(confirm("Delete?")) { DATA = DATA.filter(d => d.id !== id); localStorage.setItem(DB_KEY, JSON.stringify(DATA)); updateNextID(); renderTable(); } }
function exportJSON() { const b = new Blob([JSON.stringify(DATA)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `DIA_Backup.json`; a.click(); }
function importJSON(e) { const reader = new FileReader(); reader.onload = (ex) => { DATA = JSON.parse(ex.target.result); localStorage.setItem(DB_KEY, JSON.stringify(DATA)); updateNextID(); renderTable(); }; reader.readAsText(e.target.files[0]); }
function clearAllData() { if(confirm("ጥንቃቄ! ሁሉንም ዳታ ማጥፋት ይፈልጋሉ?") && prompt("Password:") === "1234") { DATA = []; localStorage.removeItem(DB_KEY); updateNextID(); renderTable(); } }
function addSubject() { let s = prompt("Subject Name:"); if(s) { document.getElementById('h_b').value += "," + s; initApp(); } }
</script>
